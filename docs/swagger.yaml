basePath: /api
definitions:
  class.ClassIdRequest:
    properties:
      id:
        type: string
    required:
    - id
    type: object
  class.EditClassRequest:
    properties:
      id:
        type: string
      name:
        type: string
      semesterId:
        type: string
    required:
    - id
    - name
    - semesterId
    type: object
  class.FilterClassRequest:
    properties:
      name:
        type: string
      semesterEndBefore:
        type: string
      semesterId:
        type: string
      semesterStartAfter:
        type: string
    type: object
  class.NewClassRequest:
    properties:
      name:
        type: string
      semesterId:
        type: string
    required:
    - name
    - semesterId
    type: object
  lesson.EditLessonRequest:
    properties:
      classId:
        type: string
      endDate:
        type: string
      id:
        type: string
      name:
        type: string
      startDate:
        type: string
    required:
    - classId
    - endDate
    - id
    - name
    - startDate
    type: object
  lesson.FilterLessonRequest:
    properties:
      classId:
        type: string
      endDate:
        type: string
      reason:
        type: string
      startDate:
        type: string
    type: object
  lesson.NewLessonRequest:
    properties:
      classId:
        type: string
      endDate:
        type: string
      name:
        type: string
      startDate:
        type: string
    required:
    - classId
    - endDate
    - name
    - startDate
    type: object
  lesson.SpecificLessonRequest:
    properties:
      id:
        type: string
    required:
    - id
    type: object
  responseTypes.ClassResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      semesterId:
        type: string
      updatedAt:
        type: string
    type: object
  responseTypes.FilteredLesson:
    properties:
      classId:
        type: string
      className:
        type: string
      createdAt:
        type: string
      endDateTime:
        type: string
      id:
        type: string
      name:
        type: string
      semesterId:
        type: string
      semesterName:
        type: string
      skipEntries:
        items:
          $ref: '#/definitions/responseTypes.SkipEntryResponse'
        type: array
      startDateTime:
        type: string
      updatedAt:
        type: string
    type: object
  responseTypes.LessonResponse:
    properties:
      classId:
        type: string
      className:
        type: string
      createdAt:
        type: string
      endDateTime:
        type: string
      id:
        type: string
      name:
        type: string
      startDateTime:
        type: string
      updatedAt:
        type: string
    type: object
  responseTypes.SemesterResponse:
    properties:
      createdAt:
        type: string
      endDate:
        type: string
      id:
        type: string
      name:
        type: string
      startDate:
        type: string
      updatedAt:
        type: string
    type: object
  responseTypes.SkipEntryResponse:
    properties:
      amount:
        type: number
      createdAt:
        type: string
      id:
        type: string
      lessonId:
        type: string
      lessonName:
        type: string
      reason:
        type: string
      updatedAt:
        type: string
      userId:
        type: string
      userName:
        type: string
    type: object
  responseTypes.SpecificLesson:
    properties:
      classId:
        type: string
      className:
        type: string
      createdAt:
        type: string
      endDateTime:
        type: string
      id:
        type: string
      name:
        type: string
      semesterId:
        type: string
      semesterName:
        type: string
      startDateTime:
        type: string
      updatedAt:
        type: string
    type: object
  responseTypes.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  semester.EditSemesterRequest:
    properties:
      endDate:
        type: string
      id:
        type: string
      name:
        type: string
      startDate:
        type: string
    required:
    - endDate
    - id
    - name
    - startDate
    type: object
  semester.NewSemesterRequest:
    properties:
      endDate:
        type: string
      name:
        type: string
      startDate:
        type: string
    required:
    - endDate
    - name
    - startDate
    type: object
  semester.SemesterIdRequest:
    properties:
      id:
        type: string
    required:
    - id
    type: object
  skipEntry.CreateNewEntryRequest:
    properties:
      amountId:
        type: string
      lessonId:
        type: string
      reason:
        type: string
      userId:
        type: string
    required:
    - amountId
    - lessonId
    - reason
    - userId
    type: object
  skipEntry.EditSkipEntryRequest:
    properties:
      amountId:
        type: string
      id:
        type: string
      lessonId:
        type: string
      reason:
        maxLength: 255
        type: string
      userId:
        type: string
    required:
    - amountId
    - id
    - lessonId
    - reason
    - userId
    type: object
  skipEntry.FilterSkipEntryRequest:
    properties:
      amountId:
        type: string
      classId:
        type: string
      endDate:
        type: string
      lessonId:
        type: string
      reason:
        type: string
      semesterId:
        type: string
      startDate:
        type: string
      userId:
        type: string
    type: object
  skipEntry.SingleIdRequest:
    properties:
      id:
        type: string
    required:
    - id
    type: object
  user.CreateNewUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  user.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for the DebtCollector app
  title: DeptCollector
  version: Alpha
paths:
  /class:
    delete:
      consumes:
      - application/json
      description: Deletes a class by its ID (from request body)
      parameters:
      - description: Delete class request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.ClassIdRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a class
      tags:
      - Classes
    get:
      consumes:
      - application/json
      description: Retrieves a class by its ID (from request body)
      parameters:
      - description: Get class by ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.ClassIdRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responseTypes.ClassResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get a specific class
      tags:
      - Classes
    post:
      consumes:
      - application/json
      description: Creates a new class and returns the created record
      parameters:
      - description: Create new class
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.NewClassRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responseTypes.ClassResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates a new class
      tags:
      - Classes
    put:
      consumes:
      - application/json
      description: Updates class details like name or semester
      parameters:
      - description: Edit existing class
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.EditClassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responseTypes.ClassResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Edit an existing class
      tags:
      - Classes
  /class/filter:
    get:
      consumes:
      - application/json
      description: Filters classes by name, semester ID, or semester start/end date
      parameters:
      - description: Filter classes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.FilterClassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/responseTypes.ClassResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Filter classes
      tags:
      - Classes
  /lesson:
    delete:
