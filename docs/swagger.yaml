    post:
      consumes:
      - application/json
      description: Creates a new lesson and returns it
      parameters:
      - description: Create new lesson
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/lesson.NewLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responseTypes.LessonResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates a new lesson
      tags:
      - Lessons
    put:
      consumes:
      - application/json
      description: Edit a lesson and returns it
      parameters:
      - description: Edit Lesson
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/lesson.EditLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responseTypes.LessonResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Edit a lesson
      tags:
      - Lessons
  /lesson/filtered:
    get:
      consumes:
      - application/json
      description: Get filtered lesson based on a lot of optional filters
      parameters:
      - description: Edit Lesson
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/lesson.FilterLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/responseTypes.FilteredLesson'
